<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SupplyNexus - Enterprise Supply Chain Management Platform by Pasha Bank" />
    <title>SupplyNexus | Enterprise SCM Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <!-- Leaflet map CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <style>
      /* Prevent Leaflet tiles from being styled by global resets */
      .leaflet-container { font-family: 'Inter', sans-serif; background: #1a1e2a; }
      .leaflet-popup-content-wrapper { background: #13161e; border: 1px solid #2a2f42; border-radius: 10px; color: #e8eaf0; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
      .leaflet-popup-tip { background: #13161e; }
      .leaflet-popup-close-button { color: #9ba3bc !important; }
      .leaflet-popup-close-button:hover { color: #e8eaf0 !important; }
      .leaflet-control-zoom a { background: #13161e !important; color: #9ba3bc !important; border-color: #2a2f42 !important; }
      .leaflet-control-zoom a:hover { background: #1a1e2a !important; color: #e8eaf0 !important; }
      .leaflet-control-attribution { background: rgba(13,15,20,0.8) !important; color: #5c6480 !important; font-size: 9px; }
      .leaflet-control-attribution a { color: #5c6480 !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
